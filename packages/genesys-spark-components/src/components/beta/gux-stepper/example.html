<h2>gux-stepper-beta</h2>

<h3>horizontal stepper</h3>
<gux-stepper-beta>
  <gux-step-beta disabled status="error">
    <span slot="title">Step title</span>
    <span slot="helper">Optional helper</span>
  </gux-step-beta>
  <gux-step-beta status="incomplete">
    <span slot="title">Step title</span>
    <span slot="helper">Optional helper</span>
  </gux-step-beta>
</gux-stepper-beta>

<h3>vertical stepper</h3>

<gux-stepper-beta orientation="vertical">
  <gux-step-beta disabled status="error">
    <span slot="title">Step title</span>
    <span slot="helper">Optional helper</span>
  </gux-step-beta>
  <gux-step-beta status="incomplete">
    <span slot="title">Step title</span>
    <span slot="helper">Optional helper</span>
  </gux-step-beta>
</gux-stepper-beta>
